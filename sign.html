<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en' }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agnopol – Sign Petition</title>
  <meta name="description" content="Sign or support humanitarian and environmental campaigns on Agnopol.">

  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- 页眉 -->
  <div id="header-placeholder"></div>
  <script>
    fetch('partials/header.html')
      .then(res => res.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);
  </script>

  <main style="max-width:700px;margin:2rem auto;padding:1rem;background-color:#121212;border-radius:8px;">
    <h2 style="text-align:center;" x-text="lang==='en' ? 'Sign / Support Campaign' : '联名签署 / 支持行动'"></h2>

    <form id="sign-form" style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label for="campaign-name" x-text="lang==='en' ? 'Campaign Name' : '行动名称'"></label>
        <input type="text" id="campaign-name" name="campaign-name" placeholder="Campaign Title" required style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <div>
        <label for="full-name" x-text="lang==='en' ? 'Your Name' : '姓名'"></label>
        <input type="text" id="full-name" name="full-name" placeholder="Full Name" required style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <div>
        <label for="email" x-text="lang==='en' ? 'Email' : '邮箱'"></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <div>
        <p style="font-size:0.85rem;" x-text="lang==='en' ? 'Optional comment' : '可选留言'"></p>
        <textarea id="comment" name="comment" placeholder="Your message..." style="width:100%;height:100px;padding:0.5rem;border-radius:4px;border:none;"></textarea>
      </div>

      <button type="submit" x-text="lang==='en' ? 'Sign / Support' : '签署 / 支持'"></button>
    </form>
  </main>

  <!-- 页脚 -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('partials/footer.html')
      .then(res => res.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
