<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en' }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agnopol – 注册</title>
  <meta name="description" content="Join Agnopol, a global humanitarian and environmental community.">

  <!-- 公共样式 -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- 页眉 -->
  <div id="header-placeholder"></div>
  <script>
    fetch('partials/header.html')
      .then(res => res.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);
  </script>

  <!-- 主内容 -->
  <main style="max-width:600px;margin:2rem auto;background-color:#121212;padding:2rem;border-radius:8px;">
    <h2 style="text-align:center;" x-text="lang==='en' ? 'Register' : '注册'"></h2>

    <form id="register-form" style="display:flex;flex-direction:column;gap:1rem;">

      <!-- 邮箱 -->
      <div>
        <label for="email" x-text="lang==='en' ? 'Email' : '邮箱'"></label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <!-- 密码 -->
      <div>
        <label for="password" x-text="lang==='en' ? 'Password' : '密码'"></label>
        <input type="password" id="password" name="password" placeholder="••••••••" 
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*\W).{8,}" 
               title="至少8位，包含大小写字母、数字和特殊符号" required 
               style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <!-- 用户名（可选） -->
      <div>
        <label for="username" x-text="lang==='en' ? 'Display Name (Optional)' : '用户名（可选）'"></label>
        <input type="text" id="username" name="username" placeholder="Your name" style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <!-- 社交账号绑定 -->
      <div>
        <p style="font-size:0.85rem;" x-text="lang==='en' ? 'Optional: Connect Facebook or X account' : '可选：绑定脸书或X账号'"></p>
        <button type="button" style="width:48%;margin-right:4px;">Facebook</button>
        <button type="button" style="width:48%;">X</button>
      </div>

      <!-- 机器人验证占位 -->
      <div>
        <p style="font-size:0.85rem;" x-text="lang==='en' ? 'Complete captcha before submitting.' : '提交前完成机器人验证。'"></p>
        <div id="captcha-placeholder" style="background-color:#1a1a1a;padding:1rem;text-align:center;border-radius:4px;">[Captcha Widget]</div>
      </div>

      <!-- 提交 -->
      <button type="submit" style="margin-top:1rem;" x-text="lang==='en' ? 'Register' : '注册'"></button>
    </form>
  </main>

  <!-- 页脚 -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('partials/footer.html')
      .then(res => res.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
