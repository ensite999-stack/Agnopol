<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agnopol</title>

<style>
:root{
    --blue:#4DA3FF;
    --green:#2F6B4F;
    --text:#0F1720;
    --sub:#6B7280;
    --border:rgba(0,0,0,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Helvetica;
    background:#fff;
    color:var(--text);
}

/* HEADER */
header{
    position:sticky;
    top:0;
    background:#fff;
    border-bottom:1px solid var(--border);
}
.header-inner{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 20px;
}
.logo{
    font-size:1.6rem;
    font-weight:800;
    letter-spacing:-0.5px;
}

/* MENU */
.menu{
    display:flex;
    gap:16px;
    font-size:0.9rem;
}
.menu a{
    text-decoration:none;
    color:var(--text);
}

/* TAGLINE */
.tagline{
    text-align:center;
    margin:60px 20px 20px;
}
.tagline a{
    text-decoration:none;
    color:var(--sub);
    font-size:0.95rem;
}

/* SECTION */
.container{
    max-width:1100px;
    margin:auto;
    padding:0 20px;
}
.section-title{
    margin:40px 0 20px;
    font-weight:600;
}

/* ACTION PLACEHOLDER */
.action-placeholder{
    border:1px dashed var(--border);
    border-radius:12px;
    padding:30px;
    text-align:center;
    color:var(--sub);
}

/* FOOTER */
footer{
    background:#0B0D10;
    color:#9CA3AF;
    padding:50px 20px;
    margin-top:80px;
}
.footer-inner{
    max-width:1100px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:30px;
}

/* left */
.footer-left{
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:0.85rem;
}
.footer-left a{
    color:#9CA3AF;
    text-decoration:none;
}

/* right brand */
.footer-brand{
    font-size:2rem;
    font-weight:900;
    letter-spacing:-1px;
    color:white;
    opacity:0.9;
    filter:blur(0.3px);
}

/* language */
.footer-lang{
    margin-top:20px;
    font-size:0.8rem;
    color:#6B7280;
}
</style>
</head>

<body>

<header>
<div class="header-inner">
    <div class="logo">Agnopol</div>

    <nav class="menu">
        <a href="#">Join</a>
        <a href="about.html">About</a>
        <a href="#">Donate</a>
        <a href="#">Contact</a>
    </nav>
</div>
</header>

<!-- TAGLINE (可点击) -->
<div class="tagline">
    <a href="about.html">
        存在之处，世界正在成为世界
    </a>
</div>

<!-- CURRENT ACTION (占位) -->
<section class="container">
<h2 class="section-title">Current Actions</h2>

<div class="action-placeholder">
    Actions will appear here.
</div>
</section>

<!-- FEED (占位) -->
<section class="container">
<h2 class="section-title">Live Activity</h2>

<div class="action-placeholder">
    Real-time activity will appear here.
</div>
</section>

<footer>
<div class="footer-inner">

<div class="footer-left">
    <a href="about.html">About</a>
    <a href="#">Archive</a>
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Use</a>
    <a href="#">Legal</a>
    <a href="#">Contact</a>
    <a href="#">Rights Statement</a>

    <div class="footer-lang">
        EN · FR · DE · ES · IT · JA · KO · ZH-HANT
    </div>

    <div style="margin-top:10px;font-size:0.8rem;">
        contact@agnopol.xyz
    </div>
</div>

<div class="footer-brand">
    AGNOPOL
</div>

</div>
</footer>

</body>
</html>
