<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agnopol</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="{ lang: 'en' }" style="margin:0; font-family: sans-serif; background-color: #fff;">

    <div id="header-wrap"></div>

    <main style="max-width:800px; margin: 4rem auto; text-align: center; padding: 0 20px;">
        <h1 style="font-size: 2.8rem; color: #1a1a1a; margin-bottom: 1rem;" 
            x-text="{en:'Agnopol',zh:'阿格诺波尔',zt:'阿格諾波爾',fr:'Agnopol',de:'Agnopol',es:'Agnopol',it:'Agnopol',ko:'아그노폴',ja:'アグノポール'}[lang]"></h1>
        
        <p style="font-size: 1.25rem; color: #555; line-height: 1.6;" 
           x-text="{
             en: 'An open community connecting individuals to drive humanitarian and environmental change.',
             zh: '一个连接个体，推动人道与环境改变的开放社区。',
             zt: '一個連接個體，推動人道與環境改變的開放社區。',
             fr: 'Une communauté ouverte reliant les individus pour stimuler le changement humanitaire et environnemental.',
             de: 'Eine offene Gemeinschaft, die Einzelpersonen verbindet, um den humanitären und ökologischen Wandel voranzutreiben.',
             es: 'Una comunidad abierta que conecta a personas para impulsar el cambio humanitario y ambiental.',
             it: 'Una comunità aperta che unisce le persone per promuovere il cambiamento umanitario e ambientale.',
             ko: '인도주의적 및 환경적 변화를 주도하기 위해 개인을 연결하는 열린 커뮤니티.',
             ja: '人道的・環境的な変化を推進するために個人をつなぐオープンなコミュニティ。'
           }[lang]"></p>

        <div style="margin-top: 2.5rem;">
            <button style="background: #4ca3ff; color: white; border: none; padding: 12px 30px; border-radius: 5px; font-size: 1rem; cursor: pointer;"
                    x-text="{en:'Get Started',zh:'开始行动',zt:'開始行動',fr:'Commencer',de:'Loslegen',es:'Empezar',it:'Inizia',ko:'시작하기',ja:'開始する'}[lang]">
            </button>
        </div>
    </main>

    <div id="footer-wrap"></div>

    <script>
        // 自动加载组件的脚本
        async function loadSiteComponents() {
            const parts = [
                { id: 'header-wrap', url: './header.html' },
                { id: 'footer-wrap', url: './footer.html' }
            ];

            for (const part of parts) {
                try {
                    const res = await fetch(part.url);
                    if (res.ok) {
                        document.getElementById(part.id).innerHTML = await res.text();
                    }
                } catch (e) {
                    console.error('加载失败:', part.url, e);
                }
            }
        }
        // 页面加载完成后运行
        window.addEventListener('DOMContentLoaded', loadSiteComponents);
    </script>
</body>
</html>
