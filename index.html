<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en' }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGNOPOL // INDIVIDUAL IMPACT NETWORK</title>
    
    <meta name="description" content="Agnopol is a decentralized network for individual humanitarian and environmental action. Individual existence impacts the world.">
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="header-wrap">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="system-id">
                <div class="status-pulse"></div>
                AGNOPOL_INTERFACE
            </div>
            <nav style="display:flex; gap:3rem; font-family: var(--font-data); font-size: 0.8rem;">
                <a href="articles.html" style="color:inherit; text-decoration:none;">[ REPORTS ]</a>
                <a href="register.html" style="color:inherit; text-decoration:none;">[ LINK_UP ]</a>
                <select x-model="lang" style="background:transparent; color:var(--neutron-blue); border:none; outline:none; cursor:pointer;">
                    <option value="en">L_EN</option>
                    <option value="zh">L_ZH</option>
                </select>
            </nav>
        </div>
    </header>

    <main class="container hero-layout">
        <section class="main-statement">
            <h1>
                <span x-text="lang === 'en' ? 'Individual' : '人的存在'"></span>
                <b x-text="lang === 'en' ? 'Impacts World.' : '作用于世界。'"></b>
            </h1>
            
            <div class="action-cluster">
                <button class="action-unit" x-text="lang === 'en' ? 'Initiate' : '初始化'"></button>
                <button class="action-unit" x-text="lang === 'en' ? 'Mission' : '品牌使命'"></button>
                <button class="action-unit" x-text="lang === 'en' ? 'Nodes' : '全球节点'"></button>
            </div>
        </section>

        <aside class="side-metrics">
            <div class="metric-row">
                <span class="metric-label" x-text="lang === 'en' ? '// IDENTITY' : '// 核心识别'"></span>
                DECENTRALIZED ACTION NETWORK
            </div>
            <div class="metric-row">
                <span class="metric-label" x-text="lang === 'en' ? '// STATUS' : '// 连接状态'"></span>
                ACTIVE CONNECTION ESTABLISHED
            </div>
            <div class="metric-row">
                <span class="metric-label" x-text="lang === 'en' ? '// PROTOCOL' : '// 运行协议'"></span>
                V2026.03.02_CORE
            </div>
        </aside>
    </main>

    <footer class="container">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
            <div>
                // NETWORK_SOURCE: AGNOPOL_SYS<br>
                // OBJECTIVE: CONNECT_HUMAN_POTENTIAL
            </div>
            <div style="text-align: right;">
                ACCESS_TERMINAL: IMPACT@AGNOPOL.XYZ<br>
                &copy; 2026 INTERNAL_REGISTRY: 1777706237
            </div>
        </div>
    </footer>

</body>
</html>
