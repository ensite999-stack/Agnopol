<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en' }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Agnopol | Individual Impact & Global Change</title>
    <meta name="description" content="Agnopol connects individuals to accumulate micro-actions into tangible change for humanity and the environment. Individual existence impacts the world.">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Agnopol",
      "alternateName": "阿格诺波尔",
      "description": "An open community connecting individuals for decentralized humanitarian and environmental action."
    }
    </script>

    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-wrap">
        <div class="container" id="header-placeholder"></div>
    </div>

    <main class="container hero-section">
        <h1 class="hero-title"
            x-text="{en:'Individual existence impacts the world.', zh:'人的存在作用于世界。', zt:'人的存在作用於世界。'}[lang]"></h1>
        
        <p class="hero-subtitle"
           x-text="{
             en: 'Agnopol connects individuals to amplify personal action, turning every micro-effort into a force for global change.',
             zh: 'Agnopol 连接个体，放大个人行动，让每一次微小努力都成为推动世界改变的力量。',
             zt: 'Agnopol 連接個體，放大個人行動，讓每一次微小努力都成為推動世界改變的力量。'
           }[lang]"></p>

        <div class="cta-group">
            <button class="cta-button primary" x-text="{en:'Get Started', zh:'开始行动', zt:'開始行動'}[lang]"></button>
            <button class="cta-button secondary" x-text="{en:'Our Mission', zh:'品牌使命', zt:'品牌使命'}[lang]"></button>
        </div>
    </main>

    <div id="footer-wrap"></div>

    <script>
        async function loadPartials() {
            const files = [
                { id: 'header-placeholder', url: './header.html' },
                { id: 'footer-wrap', url: './footer.html' }
            ];
            for (const file of files) {
                const res = await fetch(file.url);
                if (res.ok) document.getElementById(file.id).innerHTML = await res.text();
            }
        }
        window.addEventListener('DOMContentLoaded', loadPartials);
    </script>
</body>
</html>
