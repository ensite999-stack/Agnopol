<!DOCTYPE html>
<html lang="en" x-data="{ lang: 'en' }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agnopol – Publish Article</title>
  <meta name="description" content="Publish your article on Agnopol.">

  <link rel="stylesheet" href="css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <!-- 页眉 -->
  <div id="header-placeholder"></div>
  <script>
    fetch('partials/header.html')
      .then(res => res.text())
      .then(html => document.getElementById('header-placeholder').innerHTML = html);
  </script>

  <main style="max-width:700px;margin:2rem auto;padding:1rem;background-color:#121212;border-radius:8px;">
    <h2 style="text-align:center;" x-text="lang==='en' ? 'Publish Article' : '发布文章'"></h2>

    <form id="publish-form" style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label for="title" x-text="lang==='en' ? 'Title' : '标题'"></label>
        <input type="text" id="title" name="title" placeholder="Your article title" required style="width:100%;padding:0.5rem;border-radius:4px;border:none;">
      </div>

      <div>
        <label for="content" x-text="lang==='en' ? 'Content' : '内容'"></label>
        <textarea id="content" name="content" placeholder="Write your article here..." required style="width:100%;height:200px;padding:0.5rem;border-radius:4px;border:none;"></textarea>
      </div>

      <div>
        <label for="tags" x-text="lang==='en' ? 'Tags (optional)' : '标签（可选）'"></label>
        <input type="text" id="tags" name="tags" placeholder="e.g. Environment, Humanitarian">
      </div>

      <button type="submit" x-text="lang==='en' ? 'Publish' : '发布'"></button>
    </form>
  </main>

  <!-- 页脚 -->
  <div id="footer-placeholder"></div>
  <script>
    fetch('partials/footer.html')
      .then(res => res.text())
      .then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>

</body>
</html>
